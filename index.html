<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zeying Xu Portfolio</title>
    <meta
      name="description"
      content="Marketing and Business Analytics portfolio presented as an interactive folder."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="portfolio-shell" aria-live="polite">
      <section class="folder-stage" aria-label="Zeying Xu portfolio folder">
        <div class="folder-back" aria-hidden="true">
          <div class="folder-tab folder-tab-main"></div>
          <div class="folder-tab folder-tab-shadow"></div>
        </div>

        <nav class="folder-tabs" aria-label="Portfolio sections">
          <button class="folder-tab-button is-active" type="button" data-section="0">
            Home
          </button>
          <button class="folder-tab-button" type="button" data-section="1">
            Analytics
          </button>
          <button class="folder-tab-button" type="button" data-section="2">
            Content
          </button>
          <button class="folder-tab-button" type="button" data-section="3">
            Creative
          </button>
          <button class="folder-tab-button" type="button" data-section="4">
            Contact
          </button>
        </nav>

        <article class="file-stack">
          <div class="paper paper-shadow paper-shadow-one" aria-hidden="true"></div>
          <div class="paper paper-shadow paper-shadow-two" aria-hidden="true"></div>
          <section class="paper active-paper" tabindex="-1">
            <div class="paper-clip" aria-hidden="true"></div>
            <p class="script-label" id="section-kicker">Marketing & Business Analytics</p>
            <h1 id="section-title">Portfolio</h1>
            <p class="section-copy" id="section-copy">
              Turning marketing data into actionable business insights through analytics,
              visualization, and storytelling.
            </p>

            <div class="content-grid">
              <div class="insight-card">
                <span class="card-label" id="section-range">Pages 1-3</span>
                <h2 id="card-title">Meet Zeying Xu</h2>
                <p id="card-copy">
                  3+ years of marketing analytics experience, performance analysis,
                  and storytelling.
                </p>
              </div>

              <figure class="preview-frame">
                <img
                  id="section-image"
                  src="page-001.png"
                  alt="Preview of the portfolio cover page"
                />
              </figure>
            </div>

            <div class="action-row" id="action-row" aria-label="Related links"></div>
          </section>
        </article>

        <div class="folder-front" aria-hidden="true"></div>

        <div class="controls" aria-label="Folder navigation controls">
          <button class="icon-button" type="button" id="prev-section" aria-label="Previous file">
            <span aria-hidden="true">‹</span>
          </button>
          <p class="page-indicator" id="page-indicator">01 / 05</p>
          <button class="icon-button" type="button" id="next-section" aria-label="Next file">
            <span aria-hidden="true">›</span>
          </button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
